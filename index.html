<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Agenda — Tim CM Pusmantap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/locale/id.js"></script>
<style>
:root{
  --navy-900:#0B1B3D;
  --navy-800:#12275A;
  --navy-700:#1B3A73;
  --navy-600:#254A8C;
  --gold-500:#C8A84B;
  --gold-400:#DEC079;
  --gold-100:#F6EFDC;
  --bg:#F3F5FA;
  --surface:#FFFFFF;
  --ink-900:#141B2E;
  --ink-700:#333E58;
  --ink-500:#5D6785;
  --ink-300:#9AA3BD;
  --border:#E3E7F1;
  --border-soft:#EDF0F7;
  --green:#15916F;
  --green-bg:#E4F5EF;
  --blue:#2F6FCE;
  --blue-bg:#E7EFFC;
  --amber:#B87A12;
  --amber-bg:#FBF0DC;
  --red:#C13B3B;
  --red-bg:#FBE9E9;
  --purple:#6D53C7;
  --purple-bg:#EDE9FB;
  --pink:#C3488B;
  --pink-bg:#FBE7F1;
  --teal:#188A8A;
  --teal-bg:#E1F3F3;
  --gray:#6B7284;
  --gray-bg:#EEF0F4;
  --shadow-sm:0 1px 2px rgba(15,25,60,.06);
  --shadow-md:0 6px 20px rgba(15,25,60,.08);
  --shadow-lg:0 16px 40px rgba(15,25,60,.14);
  --radius:14px;
  --radius-sm:9px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink-900);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Sora',sans-serif;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#C7CEDF;border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#A9B2C9;}
.hidden{display:none !important;}

/* ===== HEADER ===== */
header.topbar{
  background:linear-gradient(120deg,var(--navy-900) 0%, var(--navy-700) 100%);
  color:#fff;
  padding:18px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;
  top:0;
  z-index:40;
  box-shadow:var(--shadow-md);
  flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold-500),var(--gold-400));
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:var(--navy-900);
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(200,168,75,.35);
}
.brand-text h1{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:0;letter-spacing:.2px;}
.brand-text p{margin:2px 0 0;font-size:12.5px;color:#B9C3E0;}
.topbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.btn{
  border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  font-family:'Inter',sans-serif;transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.96);}
.btn-gold{background:var(--gold-500);color:var(--navy-900);}
.btn-gold:hover{background:var(--gold-400);}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);}
.btn-ghost:hover{background:rgba(255,255,255,.18);}
.btn-outline{background:#fff;color:var(--navy-800);border:1px solid var(--border);}
.btn-outline:hover{background:var(--gold-100);border-color:var(--gold-400);}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-danger:hover{background:#f6d5d5;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.icon{width:15px;height:15px;flex-shrink:0;}
.storage-pill{
  display:flex;align-items:center;gap:6px;font-size:11.5px;color:#B9C3E0;
  background:rgba(255,255,255,.08);padding:6px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.14);
}
.dot{width:7px;height:7px;border-radius:50%;background:#3CCB8F;flex-shrink:0;}
.dot.saving{background:var(--gold-400);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ===== LAYOUT ===== */
main.content{max-width:1440px;margin:0 auto;padding:22px 28px 60px;}

/* ===== KPI ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:14px;margin-bottom:20px;}
@media (max-width:1300px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
@media (max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 16px 16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
  border-left:4px solid var(--accent-color, var(--navy-700));
  transition:transform .15s ease, box-shadow .15s ease;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi-card .kpi-icon{
  width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;
}
.kpi-label{font-size:11.5px;color:var(--ink-500);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.kpi-value{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:var(--ink-900);line-height:1.1;}
.kpi-sub{font-size:11.5px;color:var(--ink-500);margin-top:4px;}

/* ===== FILTER BAR ===== */
.filter-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow-sm);
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.search-wrap{position:relative;flex:1 1 240px;min-width:200px;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:9px;
  font-size:13px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink-900);
}
.search-wrap input:focus{outline:2px solid var(--navy-600);outline-offset:-1px;background:#fff;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-300);}
select.filter-select, input.filter-date{
  padding:9px 10px;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink-700);cursor:pointer;min-width:130px;
}
input.filter-date{cursor:default;min-width:128px;}
.filter-date-sep{font-size:12px;color:var(--ink-300);}
select.filter-select:focus, input.filter-date:focus{outline:2px solid var(--navy-600);outline-offset:-1px;}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;margin-bottom:18px;padding:6px;overflow-x:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow-sm);
}
.tab-btn{
  padding:10px 18px;font-size:13px;font-weight:700;color:var(--ink-500);background:transparent;border:none;
  cursor:pointer;border-radius:9px;display:flex;align-items:center;gap:8px;white-space:nowrap;
  font-family:'Inter',sans-serif;transition:background .15s ease,color .15s ease,transform .1s ease;
}
.tab-btn:hover{color:var(--navy-800);background:var(--gold-100);}
.tab-btn:active{transform:scale(.97);}
.tab-btn.active{
  color:#fff;background:linear-gradient(120deg,var(--navy-800) 0%,var(--navy-600) 100%);
  box-shadow:0 4px 12px rgba(18,39,90,.32);
}
.tab-btn.active:hover{background:linear-gradient(120deg,var(--navy-800) 0%,var(--navy-600) 100%);}
.tab-btn .count-badge{background:var(--gray-bg);color:var(--ink-500);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;}
.tab-btn.active .count-badge{background:rgba(255,255,255,.24);color:#fff;}
.tab-icon{width:15px;height:15px;flex-shrink:0;opacity:.85;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.tab-panel{animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== BADGES (T-House categories) ===== */
.cat-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
  font-size:11.5px;font-weight:600;white-space:nowrap;
}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
.unit-badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:7px;
  font-size:11.5px;font-weight:700;white-space:nowrap;background:var(--navy-800);color:#fff;
  letter-spacing:.02em;
}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px;}
table.data-table thead th{
  text-align:left;padding:11px 14px;background:var(--bg);color:var(--ink-500);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;
}
table.data-table thead th:hover{color:var(--navy-800);}
table.data-table thead th .sort-ind{margin-left:4px;color:var(--ink-300);font-size:10px;}
table.data-table tbody td{padding:12px 14px;border-bottom:1px solid var(--border-soft);vertical-align:top;color:var(--ink-700);}
table.data-table tbody tr{cursor:pointer;transition:background .1s;}
table.data-table tbody tr:hover{background:#F8F9FD;}
.table-title{font-weight:600;color:var(--ink-900);margin-bottom:3px;}
.table-meta{font-size:11.5px;color:var(--ink-500);}
.row-actions{display:flex;gap:6px;}
.icon-btn{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-500);
}
.icon-btn:hover{background:var(--bg);color:var(--navy-800);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--border);font-size:12.5px;color:var(--ink-500);flex-wrap:wrap;gap:10px;}
.page-size-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:var(--bg);color:var(--ink-700);cursor:pointer;margin-left:8px;}
.pagination-left{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.page-btns{display:flex;gap:6px;}
.page-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12.5px;color:var(--ink-700);transition:background .12s;}
.page-btn:hover:not(:disabled):not(.active){background:var(--gold-100);border-color:var(--gold-400);}
.page-btn.active{background:var(--navy-800);color:#fff;border-color:var(--navy-800);}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}

.empty-state{padding:60px 20px;text-align:center;color:var(--ink-500);}
.empty-state svg{color:var(--ink-300);margin-bottom:12px;}
.empty-state h3{font-family:'Sora',sans-serif;color:var(--ink-700);margin:0 0 6px;font-size:16px;}

/* ===== CALENDAR ===== */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
  background:linear-gradient(120deg,var(--navy-800),var(--navy-700));border-radius:14px 14px 0 0;
}
.cal-title{font-family:'Sora',sans-serif;font-weight:700;font-size:17px;color:#fff;}
.cal-nav{display:flex;gap:6px;}
.cal-nav .btn-outline{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25);}
.cal-nav .btn-outline:hover{background:rgba(255,255,255,.22);border-color:var(--gold-400);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:38px;grid-auto-rows:118px;}
.cal-dow{
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;
  background:var(--navy-600);letter-spacing:.05em;
}
.cal-dow.weekend{background:#3A5599;}
.cal-cell{
  height:118px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
  padding:7px;position:relative;overflow:hidden;background:#fff;display:flex;flex-direction:column;
}
.cal-cell.weekend{background:#F4F7FF;}
.cal-cell.muted{background:#EEF0F5;}
.cal-cell.today{background:linear-gradient(160deg,#FFF7E3,var(--gold-100));box-shadow:inset 0 0 0 2px var(--gold-500);}
.cal-daynum{font-size:12.5px;font-weight:700;color:var(--ink-500);margin-bottom:4px;flex-shrink:0;}
.cal-cell.today .cal-daynum{color:var(--navy-800);font-weight:800;}
.cal-events-scroll{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;padding-right:2px;}
.cal-event{
  font-size:10.5px;padding:3px 7px;border-radius:6px;cursor:pointer;font-weight:700;line-height:1.3;
  white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.cal-event:hover{filter:brightness(0.95);}
.cal-more{font-size:10px;color:var(--navy-700);font-weight:700;cursor:pointer;padding:2px 6px;flex-shrink:0;}

/* ===== KANBAN ===== */
.kanban-wrap{display:flex;gap:14px;padding:16px;overflow-x:auto;}
.kanban-col{flex:1 1 260px;min-width:260px;background:var(--bg);border-radius:var(--radius-sm);padding:12px;max-height:640px;display:flex;flex-direction:column;}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px;}
.kanban-col-title{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;}
.kanban-count{background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 9px;font-size:11px;color:var(--ink-500);}
.kanban-cards{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:2px;}
.kanban-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;box-shadow:var(--shadow-sm);}
.kanban-card:hover{border-color:var(--navy-600);}
.kanban-card-title{font-size:12.5px;font-weight:600;color:var(--ink-900);margin-bottom:6px;line-height:1.3;}
.kanban-card-meta{font-size:11px;color:var(--ink-500);display:flex;align-items:center;gap:4px;margin-top:4px;}

/* ===== MATRIX ===== */
.matrix-wrap{padding:16px;overflow-x:auto;}
table.matrix-table{border-collapse:collapse;font-size:12px;width:100%;table-layout:fixed;}
table.matrix-table th, table.matrix-table td{border:1px solid var(--border-soft);padding:9px 8px;text-align:center;white-space:normal;word-break:break-word;overflow-wrap:break-word;line-height:1.3;}
table.matrix-table th{background:var(--bg);font-weight:700;color:var(--ink-700);font-size:11px;}
table.matrix-table td.matrix-label{text-align:left;font-weight:600;background:var(--bg);color:var(--ink-700);}
table.matrix-table td.matrix-cell{font-weight:700;color:var(--navy-800);}
table.matrix-table td.matrix-total{background:var(--gold-100);font-weight:800;color:var(--navy-900);}

/* ===== ANALYTICS ===== */
.analytics-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;padding:16px;}
@media (max-width:1000px){.analytics-grid{grid-template-columns:1fr;}}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;position:relative;overflow:hidden;}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--chart-accent, var(--navy-700));}
.chart-card h3{font-family:'Sora',sans-serif;font-size:13.5px;margin:0 0 12px;color:var(--ink-900);}
.chart-box{position:relative;height:240px;}
.chart-box.tall{height:300px;}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,27,61,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-box{background:#fff;border-radius:16px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-box.small{max-width:420px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;z-index:2;}
.modal-head h2{font-family:'Sora',sans-serif;font-size:17px;margin:0;color:var(--ink-900);}
.modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-500);}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:12px;font-weight:600;color:var(--ink-700);}
.form-field input, .form-field select, .form-field textarea{
  padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--ink-900);
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus{outline:2px solid var(--navy-600);outline-offset:-1px;background:#fff;}
.form-field textarea{resize:vertical;min-height:60px;}
.req{color:var(--red);}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-item{padding:10px 0;border-bottom:1px solid var(--border-soft);}
.detail-item.full{grid-column:1/-1;}
.detail-label{font-size:11px;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.detail-value{font-size:13.5px;color:var(--ink-900);white-space:pre-line;line-height:1.5;}

/* ===== TOAST ===== */
#toastContainer{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--navy-900);color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:260px;max-width:360px;
  animation:slideIn .25s ease;
}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.info{background:var(--navy-800);}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ===== IMPORT DROP-ZONE ===== */
.drop-zone{
  border:2.5px dashed var(--border);border-radius:14px;padding:40px 24px;text-align:center;
  cursor:pointer;transition:border-color .15s, background .15s;background:var(--bg);
}
.drop-zone:hover{border-color:var(--gold-500);background:var(--gold-100);}
.drop-zone.drag-over{border-color:var(--navy-700);background:var(--blue-bg);}
.drop-zone svg{color:var(--ink-300);margin-bottom:10px;}
.drop-zone.drag-over svg{color:var(--navy-700);}
.drop-zone-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;color:var(--ink-900);margin-bottom:4px;}
.drop-zone-sub{font-size:12.5px;color:var(--ink-500);}
.drop-zone-browse{color:var(--navy-700);font-weight:700;text-decoration:underline;cursor:pointer;}

/* ===== LOADING ===== */
#loadingOverlay{position:fixed;inset:0;background:rgba(11,27,61,.75);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.25);border-top-color:var(--gold-500);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

};
function getCategoryStyle(kategori) {
  const up = (kategori || '').toUpperCase();
  for (const key in CATEGORY_STYLES) {
    if (key !== 'DEFAULT' && up.includes(key)) return CATEGORY_STYLES[key];
  }
  return CATEGORY_STYLES.DEFAULT;
}

// Normalize free-text status into canonical buckets
function normalizeStatus(raw) {
  const s = (raw || '').toLowerCase();
  if (s.includes('batal') || s.includes('cancel')) return 'Dibatalkan';
  if (s.includes('done') || s.includes('selesai')) return 'Selesai';
  if (s.includes('menunggu') || s.includes('tunda') || s.includes('pending')) return 'Tertunda';
  if (s.includes('confirm') || s.includes('berjalan') || s.includes('proses')) return 'Berjalan';
  if (!s) return 'Terjadwal';
  return 'Terjadwal';
}
const STATUS_STYLES = {
  'Selesai':    { bg:'#E7ECF6', fg:'#12275A' },
  'Terjadwal':  { bg:'#EBF1FA', fg:'#254A8C' },
  'Berjalan':   { bg:'#F6EFDC', fg:'#C8A84B' },

  'Dibatalkan': { bg:'var(--red-bg)',    fg:'var(--red)' },

  n = Number(n) || 0;
  return 'Rp ' + n.toLocaleString('id-ID');
}
function fmtDate(d, format) {
  if (!d) return '-';
  const dj = dayjs(d);
  if (!dj.isValid()) return d;
  return dj.format(format || 'DD MMM YYYY');
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function uid(prefix) {
  return (prefix || 'AGD') + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
// Splits a name-list string on commas AND the word "dan" (whole word only, case-insensitive)
// so "Tya dan Dina" is treated the same as "Tya, Dina" — two separate people, not one cluster.
function splitNames(str) {
  if (!str) return [];
  return String(str).split(/\s*,\s*|\s+dan\s+/gi).map(s => s.trim()).filter(Boolean);
}

// Classify whether a "Unit Pemohon" is internal to Kemenkeu (Eselon I/II units, always prefixed DJ,
// or known central units) versus an external institution (other K/L, OJK, etc.)
const KEMENKEU_INTERNAL_UNITS = new Set([
  'BATII','SETJEN','ITJEN','BPPK','PUSMANTAP','PUSDATIN','PUSINTEK','PUSPENSI','PUSAKTI',
  'PUSDIKLAT','PUSKPAKN','PUSAT LPSE','LNSW','LPDP','STAN','PKN STAN'
]);
function isInternalUnit(unit) {
  const u = (unit || '').toUpperCase().trim();
  if (!u || u === '-') return true;
  if (u.startsWith('DJ')) return true;
  return KEMENKEU_INTERNAL_UNITS.has(u);
}

/* ============================================================

const state = {

function preprocess(list) {
  return list.map(item => {
    const tglMulai = item.tglMulai || dayjs().format('YYYY-MM-DD');
    const searchKey = [
      item.namaKegiatan, item.picTimCM, item.programTerkait, item.kategori,

    ].join(' ').toLowerCase();
    return {
      id: item.id || uid('AGD'),

      tglSelesai: item.tglSelesai || tglMulai,

}
function normalizeLayanan(raw) {
  const s = String(raw || '').trim().toLowerCase();
  return (s === 'ya' || s === 'yes' || s === 'y' || s === 'true' || s === '1') ? 'Ya' : 'Tidak';
}


/* ============================================================
   STORAGE (window.storage — persistent, personal)
============================================================ */
// Uses Claude's window.storage API when available (inside a Claude.ai artifact),
// and transparently falls back to the browser's own localStorage when it isn't
// (e.g. when this file is hosted standalone on GitHub Pages or any other server).
function hasClaudeStorage() {
  return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.set === 'function';
}

async function persist() {
  const dot = document.getElementById('storageDot');
  const txt = document.getElementById('storageText');
  try {
    dot.classList.add('saving'); txt.textContent = 'Menyimpan...';
    if (hasClaudeStorage()) {
      await window.storage.set(STORAGE_KEY, JSON.stringify(state.agendas), false);
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.agendas));
    }
    dot.classList.remove('saving'); txt.textContent = 'Tersimpan';
  } catch (e) {
    dot.classList.remove('saving'); txt.textContent = 'Gagal sinkron';
    console.error('Storage error:', e);
  }
}

async function loadInitial() {
  let loaded = null;
  try {
    if (hasClaudeStorage()) {
      const res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value) loaded = JSON.parse(res.value);
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) loaded = JSON.parse(raw);
    }
  } catch (e) {
    loaded = null;
  }
  if (loaded && Array.isArray(loaded) && loaded.length) {
    state.agendas = preprocess(loaded);
  } else {
    const seedEl = document.getElementById('seedDataJson');
    let seed = [];
    try { seed = JSON.parse(seedEl.textContent); } catch (e) { seed = []; }
    state.agendas = preprocess(seed);
  }
}

    if (f.dateFrom && a.tglMulai < f.dateFrom) return false;
    if (f.dateTo && a.tglMulai > f.dateTo) return false;
    return true;
  });
  out.sort((x, y) => {
    let av = x[state.sortKey], bv = y[state.sortKey];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
    if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return out;
}

function uniqueSorted(list, key, splitComma) {
  const set = new Set();
  list.forEach(item => {
    const val = item[key];
    if (!val) return;
    if (splitComma) {
      splitNames(val).forEach(t => { if (t) set.add(t); });
    } else {
      set.add(val);
    }
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b, 'id'));
}

function pageButtons(current, total) {
  let pages = [];
  const maxShown = 5;
  let start = Math.max(1, current - 2);
  let end = Math.min(total, start + maxShown - 1);
  start = Math.max(1, end - maxShown + 1);
  for (let i = start; i <= end; i++) pages.push(i);
  return pages.map(p => `<button class="page-btn ${p === current ? 'active' : ''}" data-page="${p}">${p}</button>`).join('');
}

/* ============================================================
   RENDER: CALENDAR TAB
============================================================ */
function renderCalendar() {
  const container = document.getElementById('tab-calendar');
  const filtered = getFiltered();
  const monthStart = dayjs(state.calMonth + '-01');
  const daysInMonth = monthStart.daysInMonth();
  const firstDow = (monthStart.day() + 6) % 7; // Monday-first: 0=Sen ... 6=Min
  const todayStr = dayjs().format('YYYY-MM-DD');

  const eventsByDay = {};
  filtered.forEach(a => {
    if (a.tglMulai.slice(0, 7) === state.calMonth) {
      const day = Number(a.tglMulai.slice(8, 10));
      if (!eventsByDay[day]) eventsByDay[day] = [];
      eventsByDay[day].push(a);
    }
  });

  let html = `<div class="cal-header">
    <div class="cal-title">${monthStart.format('MMMM YYYY')}</div>
    <div class="cal-nav">
      <button class="btn btn-outline btn-sm" id="calPrev">&lsaquo; Sebelumnya</button>
      <button class="btn btn-outline btn-sm" id="calToday">Hari Ini</button>
      <button class="btn btn-outline btn-sm" id="calNext">Berikutnya &rsaquo;</button>
    </div>
  </div>
  <div class="cal-grid">`;
  ['Sen','Sel','Rab','Kam','Jum','Sab','Min'].forEach((d, i) => html += `<div class="cal-dow ${(i===5||i===6)?'weekend':''}">${d}</div>`);
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell muted ${(i===5)?'weekend':''}"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = state.calMonth + '-' + String(d).padStart(2, '0');
    const isToday = dateStr === todayStr;
    const dow = (firstDow + d - 1) % 7;
    const isWeekend = dow === 5 || dow === 6;
    const evs = eventsByDay[d] || [];
    html += `<div class="cal-cell ${isToday ? 'today' : ''} ${isWeekend && !isToday ? 'weekend' : ''}">
      <div class="cal-daynum">${d}</div>
      <div class="cal-events-scroll">`;
    evs.slice(0, 4).forEach(ev => {
      const cs = getCategoryStyle(ev.kategori);
      html += `<div class="cal-event" data-id="${ev.id}" title="${escapeHtml(ev.namaKegiatan)}" style="background:${cs.bg};color:${cs.fg}">${escapeHtml(ev.namaKegiatan)}</div>`;
    });
    if (evs.length > 4) html += `<div class="cal-more" data-day="${d}">+${evs.length - 4} lainnya</div>`;
    html += `</div></div>`;
  }
  html += `</div>`;
  container.innerHTML = html;

  document.getElementById('calPrev').addEventListener('click', () => { state.calMonth = monthStart.subtract(1, 'month').format('YYYY-MM'); renderCalendar(); });
  document.getElementById('calNext').addEventListener('click', () => { state.calMonth = monthStart.add(1, 'month').format('YYYY-MM'); renderCalendar(); });
  document.getElementById('calToday').addEventListener('click', () => { state.calMonth = dayjs().format('YYYY-MM'); renderCalendar(); });
  container.querySelectorAll('.cal-event').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.id)));
  container.querySelectorAll('.cal-more').forEach(el => el.addEventListener('click', () => {
    const day = el.dataset.day;
    const list = eventsByDay[day] || [];
    toast(list.map(x => x.namaKegiatan).join(' · '), 'info');
  }));
}

/* ============================================================
   RENDER: MATRIX TAB
============================================================ */
function renderMatrix() {
  const container = document.getElementById('tab-matrix');
  const filtered = getFiltered();

  const dimKey = state.matrixDim === 'unit' ? 'unitPemohon' : 'programTerkait';
  const dimLabel = state.matrixDim === 'unit' ? 'Unit Pemohon' : 'Program';

  const toggleHtml = `<div style="display:flex;align-items:center;gap:8px;padding:14px 16px 0;">
    <span style="font-size:12px;font-weight:700;color:var(--ink-500);">Bandingkan Kategori dengan:</span>
    <button class="btn btn-sm ${state.matrixDim!=='unit'?'btn-gold':'btn-outline'}" id="matrixDimProgram">Program Terkait</button>
    <button class="btn btn-sm ${state.matrixDim==='unit'?'btn-gold':'btn-outline'}" id="matrixDimUnit">Unit Pemohon</button>
  </div>`;

  if (!filtered.length) { container.innerHTML = toggleHtml + emptyState('Belum ada data untuk matriks', 'Sesuaikan filter atau tambah data.'); wireMatrixToggle(); return; }

  const kategoris = uniqueSorted(filtered, 'kategori');
  const cols = uniqueSorted(filtered, dimKey);
  const grid = {};
  kategoris.forEach(k => { grid[k] = {}; cols.forEach(p => grid[k][p] = 0); });
  filtered.forEach(a => { if (grid[a.kategori]) grid[a.kategori][a[dimKey]] = (grid[a.kategori][a[dimKey]] || 0) + 1; });

  const maxVal = Math.max(1, ...kategoris.flatMap(k => cols.map(p => grid[k][p])));

  let colgroup = `<colgroup><col style="width:170px;">`;
  cols.forEach(() => { colgroup += `<col>`; });
  colgroup += `<col style="width:80px;"></colgroup>`;
  const minTableWidth = 170 + 80 + cols.length * 100;

  let html = toggleHtml + `<div class="matrix-wrap"><table class="matrix-table" style="min-width:${minTableWidth}px;">${colgroup}<thead><tr><th style="text-align:left;">Kategori \\ ${escapeHtml(dimLabel)}</th>`;
  cols.forEach(p => html += `<th>${escapeHtml(p)}</th>`);
  html += `<th>Total</th></tr></thead><tbody>`;
  kategoris.forEach(k => {
    let rowTotal = 0;
    html += `<tr><td class="matrix-label">${escapeHtml(k)}</td>`;
    cols.forEach(p => {
      const v = grid[k][p];
      rowTotal += v;
      const intensity = v / maxVal;
      const bgAlpha = v === 0 ? 'transparent' : `rgba(27,58,115,${0.08 + intensity * 0.35})`;
      html += `<td class="matrix-cell" style="background:${bgAlpha};">${v || ''}</td>`;
    });
    html += `<td class="matrix-total">${rowTotal}</td></tr>`;
  });
  // column totals
  html += `<tr><td class="matrix-label">Total</td>`;
  let grandTotal = 0;
  cols.forEach(p => {
    const colTotal = kategoris.reduce((s, k) => s + grid[k][p], 0);
    grandTotal += colTotal;
    html += `<td class="matrix-total">${colTotal}</td>`;
  });
  html += `<td class="matrix-total">${grandTotal}</td></tr>`;
  html += `</tbody></table></div>`;
  container.innerHTML = html;
  wireMatrixToggle();
}
function wireMatrixToggle() {
  const btnProgram = document.getElementById('matrixDimProgram');
  const btnUnit = document.getElementById('matrixDimUnit');
  if (btnProgram) btnProgram.addEventListener('click', () => { state.matrixDim = 'program'; renderMatrix(); });
  if (btnUnit) btnUnit.addEventListener('click', () => { state.matrixDim = 'unit'; renderMatrix(); });
}

      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top:36, bottom:36, left:70, right:70 } },
      plugins:{
        legend:{position:'bottom', labels:{boxWidth:11, font:{size:11}}},

          callbacks:{
            label: (ctx) => {
              const val = ctx.parsed;
              const pct = statusTotal ? Math.round(val/statusTotal*100) : 0;
              return ` ${ctx.label}: ${val} kegiatan (${pct}%)`;

          }

        datalabels: { display:false }

    }

  // Layanan vs Non-Layanan donut — with count+label datalabels and rich tooltip
  const layananMap = { 'Layanan': 0, 'Non-Layanan': 0 };
  filtered.forEach(a => { layananMap[a.layanan === 'Ya' ? 'Layanan' : 'Non-Layanan']++; });
  const layananTotal = layananMap['Layanan'] + layananMap['Non-Layanan'];
  const layananColors = { 'Layanan':'#1B3A73', 'Non-Layanan':'#C8A84B' };
  state.charts.layanan = new Chart(document.getElementById('chartLayanan'), {

    plugins: [buildDonutLeaderPlugin({ showName: false })],
    options: {
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top:36, bottom:36, left:70, right:70 } },
      plugins:{
        legend:{position:'bottom', labels:{boxWidth:11, font:{size:11}}},
        tooltip:{
          callbacks:{
            label: (ctx) => {
              const val = ctx.parsed;
              const pct = layananTotal ? Math.round(val/layananTotal*100) : 0;
              return ` ${ctx.label}: ${val} kegiatan (${pct}%)`;
            }
          }
        },
        datalabels: { display:false }
      }
    }
  });

  // Kategori bar — stacked by Layanan vs Non-Layanan
  const catMapYa = {}; const catMapTidak = {};
  filtered.forEach(a => {
    const target = a.layanan === 'Ya' ? catMapYa : catMapTidak;
    target[a.kategori] = (target[a.kategori] || 0) + 1;
  });
  const catTotalMap = {};
  filtered.forEach(a => { catTotalMap[a.kategori] = (catTotalMap[a.kategori] || 0) + 1; });
  const catLabels = Object.keys(catTotalMap).sort((a,b)=>catTotalMap[b]-catTotalMap[a]);
  state.charts.kategori = new Chart(document.getElementById('chartKategori'), {
    type: 'bar',

      labels: catLabels,
      datasets: [

        { label:'Non-Layanan', data: catLabels.map(c => catMapTidak[c] || 0), backgroundColor:'#C8A84B', borderRadius:6, maxBarThickness:34 },
      ]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true, position:'bottom', labels:{boxWidth:11,font:{size:11}}}, datalabels:{display:false},
        tooltip:{ callbacks:{ label:(ctx)=> ctx.parsed.x > 0 ? `${ctx.dataset.label}: ${ctx.parsed.x} kegiatan` : null, filter:(ctx)=>ctx.parsed.x>0 } }
      },
      scales:{
        x:{ stacked:true, beginAtZero:true, ticks:{precision:0}, title: axisTitle('Jumlah Kegiatan') },
        y:{ stacked:true, title: axisTitle('Kategori') }
      }
    }
  });

  // PIC workload
  const picMap = {};
  filtered.forEach(a => { splitNames(a.picTimCM).forEach(t => { if (t) picMap[t] = (picMap[t] || 0) + 1; }); });
  const picSorted = Object.entries(picMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  state.charts.pic = new Chart(document.getElementById('chartPic'), {
    type: 'bar',
    data: { labels: picSorted.map(p=>p[0]), datasets: [{ label:'Kegiatan', data: picSorted.map(p=>p[1]), backgroundColor:'#254A8C', borderRadius:6, maxBarThickness:28 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{
        y:{ beginAtZero:true, ticks:{precision:0}, title: axisTitle('Jumlah Kegiatan') },
        x:{ ticks:{font:{size:10}}, title: axisTitle('PIC') }
      }
    }
  });

  // Unit Pemohon distribution — internal Kemenkeu (navy) vs eksternal (gold)
  const unitMap = {};
  filtered.forEach(a => { unitMap[a.unitPemohon] = (unitMap[a.unitPemohon] || 0) + 1; });
  const unitLabels = Object.keys(unitMap).sort((a,b)=>unitMap[b]-unitMap[a]);
  const unitInternalData = unitLabels.map(u => isInternalUnit(u) ? unitMap[u] : 0);
  const unitExternalData = unitLabels.map(u => isInternalUnit(u) ? 0 : unitMap[u]);
  state.charts.unit = new Chart(document.getElementById('chartUnit'), {
    type: 'bar',
    data: {
      labels: unitLabels,
      datasets: [
        { label:'Internal Kemenkeu', data: unitInternalData, backgroundColor:'#1B3A73', borderRadius:6, maxBarThickness:28 },
        { label:'Eksternal', data: unitExternalData, backgroundColor:'#C8A84B', borderRadius:6, maxBarThickness:28 },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true, position:'bottom', labels:{boxWidth:11, font:{size:11}}}, datalabels:{display:false},
        tooltip:{ callbacks:{ label:(ctx)=> ctx.parsed.y > 0 ? `${ctx.dataset.label}: ${ctx.parsed.y} kegiatan` : null, filter:(ctx)=>ctx.parsed.y>0 } }
      },
      scales:{
        x:{ stacked:true, ticks:{font:{size:10}}, title: axisTitle('Unit Pemohon') },
        y:{ stacked:true, beginAtZero:true, ticks:{precision:0}, title: axisTitle('Jumlah Kegiatan') }
      }
    }
  });
}
// Custom Chart.js plugin: draws donut slice labels the way Excel/PowerPoint do —
// large slices get their label centered inside the ring; small slices (where an
// inside label would overlap its neighbors) get pushed outside with a leader line.
function buildDonutLeaderPlugin(opts) {
  const showName = !opts || opts.showName !== false;
  return {
    id: 'donutLeaderLabels',
    afterDraw(chart) {
      const meta = chart.getDatasetMeta(0);
      if (!meta || !meta.data || !meta.data.length) return;
      const ctx = chart.ctx;
      const dataArr = chart.data.datasets[0].data;
      const labelsArr = chart.data.labels;
      const total = dataArr.reduce((s, v) => s + (v || 0), 0);
      if (!total) return;

      const SMALL_THRESHOLD = 0.10; // slices under 10% get an outside leader-line label
      const outsidePoints = []; // collected first, so we can declutter vertically per side

      meta.data.forEach((arc, i) => {
        const value = dataArr[i] || 0;
        if (!value) return;
        const pct = value / total;
        const mid = (arc.startAngle + arc.endAngle) / 2;
        const cos = Math.cos(mid), sin = Math.sin(mid);
        const cx = arc.x, cy = arc.y;

        if (pct >= SMALL_THRESHOLD) {
          // Inside label — centered in the ring at the slice's mid-radius
          const r = (arc.innerRadius + arc.outerRadius) / 2;
          const px = cx + r * cos, py = cy + r * sin;
          ctx.save();
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          if (showName) {
            ctx.font = "700 12px 'Inter', sans-serif";
            ctx.fillText(String(labelsArr[i]), px, py - 7);
            ctx.font = "600 11px 'Inter', sans-serif";
            ctx.fillText(`${value} (${Math.round(pct * 100)}%)`, px, py + 8);
          } else {
            ctx.font = "700 13px 'Inter', sans-serif";
            ctx.fillText(`${value} (${Math.round(pct * 100)}%)`, px, py);
          }
          ctx.restore();
        } else {
          // Outside label — anchor point on the arc, elbow, then horizontal leader line
          const arcPt = { x: cx + arc.outerRadius * cos, y: cy + arc.outerRadius * sin };
          const elbow = { x: cx + (arc.outerRadius + 14) * cos, y: cy + (arc.outerRadius + 14) * sin };
          const side = cos >= 0 ? 1 : -1;
          const labelPt = { x: elbow.x + side * 22, y: elbow.y };
          outsidePoints.push({ i, value, pct, side, arcPt, elbow, labelPt, color: chart.data.datasets[0].backgroundColor[i] });
        }
      });

      // Declutter: within each side, sort by y and enforce a minimum vertical gap
      [-1, 1].forEach(side => {
        const group = outsidePoints.filter(p => p.side === side).sort((a, b) => a.labelPt.y - b.labelPt.y);
        const minGap = 34;
        for (let k = 1; k < group.length; k++) {
          if (group[k].labelPt.y - group[k - 1].labelPt.y < minGap) {
            group[k].labelPt.y = group[k - 1].labelPt.y + minGap;
          }
        }
      });

      outsidePoints.forEach(p => {
        ctx.save();
        // leader line: arc -> elbow -> label
        ctx.beginPath();
        ctx.moveTo(p.arcPt.x, p.arcPt.y);
        ctx.lineTo(p.elbow.x, p.elbow.y);
        ctx.lineTo(p.labelPt.x - (p.side * 4), p.labelPt.y);
        ctx.strokeStyle = '#9AA3BD';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // small dot at the arc point
        ctx.beginPath();
        ctx.arc(p.arcPt.x, p.arcPt.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        ctx.textAlign = p.side === 1 ? 'left' : 'right';
        ctx.textBaseline = 'middle';
        const sub = `${p.value} (${Math.round(p.pct * 100)}%)`;
        if (showName) {
          ctx.font = "700 11.5px 'Inter', sans-serif";
          ctx.fillStyle = '#141B2E';
          const label = `${chart.data.labels[p.i]}`;
          ctx.fillText(label, p.labelPt.x, p.labelPt.y - 6);
          ctx.font = "600 10.5px 'Inter', sans-serif";
          ctx.fillStyle = '#5D6785';
          ctx.fillText(sub, p.labelPt.x, p.labelPt.y + 7);
        } else {
          ctx.font = "700 11.5px 'Inter', sans-serif";
          ctx.fillStyle = '#141B2E';
          ctx.fillText(sub, p.labelPt.x, p.labelPt.y);
        }
        ctx.restore();
      });
    }
  };
}

function cssVarToHex(varStr) {
  if (!varStr) return '#6B7284';
  if (varStr.startsWith('#')) return varStr; // already a raw hex color, pass through
  const map = { 'var(--green)':'#15916F','var(--blue)':'#2F6FCE','var(--amber)':'#B87A12','var(--red)':'#C13B3B','var(--teal)':'#188A8A',
    'var(--purple)':'#6D53C7','var(--pink)':'#C3488B','var(--gray)':'#6B7284','#2E8B3D':'#2E8B3D' };
  return map[varStr] || '#6B7284';
}

/* ============================================================

============================================================ */
function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  renderActiveTab();
}
function renderActiveTab() {
  if (state.activeTab === 'table') renderTable();
  else if (state.activeTab === 'calendar') renderCalendar();
  else if (state.activeTab === 'kanban') renderKanban();
  else if (state.activeTab === 'matrix') renderMatrix();
  else if (state.activeTab === 'analytics') renderAnalytics();
}

}

async function submitForm() {
  const form = document.getElementById('agendaForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const fd = new FormData(form);
  const obj = {};
  fd.forEach((val, key) => obj[key] = val);

  if (state.editingId) {
    const idx = state.agendas.findIndex(x => x.id === state.editingId);
    if (idx > -1) {
      const merged = { ...state.agendas[idx], ...obj };
      state.agendas[idx] = preprocess([merged])[0];
    }
    toast('Kegiatan berhasil diperbarui', 'success');
  } else {
    obj.id = uid('AGD');
    obj.no = state.agendas.length + 1;
    state.agendas.push(preprocess([obj])[0]);
    toast('Kegiatan baru berhasil ditambahkan', 'success');
  }
  document.getElementById('formModal').classList.add('hidden');
  await persist();
  refreshAll();
}

/* ============================================================
   EXCEL IMPORT (robust, non-blocking, never hangs)
============================================================ */
const FIELD_MATCHERS = [
  ['tglMulai', ['tanggal mulai','tgl mulai','tanggal awal','start date']],
  ['tglSelesai', ['tanggal selesai','tgl selesai','tanggal akhir','end date']],
  ['waktu', ['waktu','jam']],
  ['namaKegiatan', ['nama kegiatan','nama agenda','kegiatan','judul','agenda']],
  ['layanan', ['layanan']],
  ['unitPemohon', ['unit pemohon','pemohon']],
  ['undangan', ['undangan']],
  ['suratTugas', ['surat tugas']],
  ['kategori', ['kategori','jenis']],
  ['programTerkait', ['program terkait','program']],
  ['tujuanOutput', ['tujuan','output','luaran']],
  ['materi', ['materi']],
  ['unitAsalNarsum', ['unit asal','narasumber','narsum']],
  ['pesertaTarget', ['peserta target','target peserta','peserta']],
  ['picTimCM', ['pic tim cm','pic','penanggung jawab']],
  ['lokasiChannel', ['lokasi','channel','tempat']],
  ['estimasiBiaya', ['estimasi biaya','biaya','anggaran']],
  ['status', ['status','progres','capaian']],
  ['catatan', ['catatan','keterangan','follow up']],
  ['no', ['no','nomor']],
];

function findHeaderRow(aoa) {
  const scanRows = Math.min(aoa.length, 12);
  for (let i = 0; i < scanRows; i++) {
    const row = (aoa[i] || []).map(c => String(c || '').toLowerCase());
    const rowStr = row.join('|');
    let hits = 0;
    ['kegiatan', 'kategori', 'status', 'tanggal', 'program', 'pic'].forEach(k => { if (rowStr.includes(k)) hits++; });
    if (hits >= 2) return i;
  }
  return 0;
}

function buildKeyMap(headerRow) {
  const headers = headerRow.map(h => String(h || '').toLowerCase().trim());
  const map = {};
  const usedCols = new Set();
  FIELD_MATCHERS.forEach(([field, patterns]) => {
    let bestCol = -1;
    for (let c = 0; c < headers.length; c++) {
      if (usedCols.has(c)) continue;
      if (patterns.some(p => headers[c].includes(p))) { bestCol = c; break; }
    }
    if (bestCol > -1) { map[field] = bestCol; usedCols.add(bestCol); }
  });
  return map;
}

function parseAnyDate(val) {
  if (val === null || val === undefined || val === '') return null;
  if (val instanceof Date) {
    // SheetJS (cellDates:true) always encodes parsed Excel dates using UTC
    // year/month/day components. Reading them back with LOCAL getters (via
    // dayjs(date).format()) shifts the date by a day for viewers whose
    // timezone offset pushes local midnight across the UTC day boundary.
    // Reading the UTC components directly sidesteps the viewer's timezone
    // entirely and always reproduces the exact calendar date from Excel.
    const y = val.getUTCFullYear();
    const m = String(val.getUTCMonth() + 1).padStart(2, '0');
    const d = String(val.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  if (typeof val === 'number') {
    try {
      const d = XLSX.SSF.parse_date_code(val);
      if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    } catch (e) { /* ignore */ }
  }
  const str = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0, 10);
  const dmy = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if (dmy) return `${dmy[3]}-${String(dmy[2]).padStart(2,'0')}-${String(dmy[1]).padStart(2,'0')}`;
  const parsed = dayjs(str);
  if (parsed.isValid()) return parsed.format('YYYY-MM-DD');
  return null;
}

function handleFileUpload(event) {

// Converts an array-of-arrays (from XLSX sheet or pasted TSV) into normalized agenda rows.
// Shared by both the Excel-file path and the paste-data path.
function importRowsFromAOA(aoa) {
  if (!aoa || !aoa.length) throw new Error('Data kosong');

  const headerIdx = findHeaderRow(aoa);
  const headerRow = aoa[headerIdx];
  const keyMap = buildKeyMap(headerRow);
  const dataRows = aoa.slice(headerIdx + 1).filter(r => r && r.some(c => c !== '' && c !== null && c !== undefined));

  if (!dataRows.length) throw new Error('Tidak ada baris data ditemukan');

  const imported = dataRows.map((row, idx) => {
    const get = (field) => (keyMap[field] !== undefined ? row[keyMap[field]] : '');
    const namaRaw = String(get('namaKegiatan') || '').trim();
    if (!namaRaw) return null; // skip footnote/instruction/blank rows — not real agenda entries
    const tglMulaiRaw = get('tglMulai');
    const tglSelesaiRaw = get('tglSelesai');
    const tglMulai = parseAnyDate(tglMulaiRaw) || dayjs().format('YYYY-MM-DD');
    const tglSelesai = parseAnyDate(tglSelesaiRaw) || tglMulai;
    return {
      id: uid('IMP'),
      no: Number(get('no')) || idx + 1,
      tglMulai, tglSelesai,
      waktu: String(get('waktu') || ''),
      namaKegiatan: namaRaw,
      layanan: normalizeLayanan(get('layanan')),
      unitPemohon: String(get('unitPemohon') || '-'),
      undangan: String(get('undangan') || ''),
      suratTugas: String(get('suratTugas') || ''),
      kategori: String(get('kategori') || 'Lainnya'),
      programTerkait: String(get('programTerkait') || '-'),
      tujuanOutput: String(get('tujuanOutput') || ''),
      materi: String(get('materi') || ''),
      unitAsalNarsum: String(get('unitAsalNarsum') || ''),
      pesertaTarget: String(get('pesertaTarget') || ''),
      picTimCM: String(get('picTimCM') || ''),
      lokasiChannel: String(get('lokasiChannel') || ''),
      estimasiBiaya: Number(get('estimasiBiaya')) || 0,
      status: String(get('status') || ''),
      catatan: String(get('catatan') || ''),
    };
  }).filter(Boolean);

  if (!imported.length) throw new Error('Tidak ada baris agenda valid (semua baris kosong atau catatan/petunjuk)');
  return imported;
}

function processExcelFile(file, onDone) {
  const done = () => { if (onDone) onDone(); };

  showLoading('Membaca file Excel...');
  // Safety-net: force-hide loading no matter what happens (prevents infinite spinner)
  const safetyTimer = setTimeout(() => {
    hideLoading();
    toast('Proses membaca file memakan waktu terlalu lama dan dihentikan.', 'error');
    done();
  }, 15000);

  setTimeout(() => {
    const reader = new FileReader();
    reader.onerror = function () {
      clearTimeout(safetyTimer);
      hideLoading();
      done();
      toast('Gagal membaca file. Coba lagi.', 'error');
    };
    reader.onload = function (e) {
      try {
        const bytes = new Uint8Array(e.target.result);
        const workbook = XLSX.read(bytes, { type: 'array', cellDates: true, cellStyles: false, cellHTML: false, cellFormula: false });
        const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('master')) || workbook.SheetNames[0];
        const ws = workbook.Sheets[sheetName];
        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });

        const imported = importRowsFromAOA(aoa);

        clearTimeout(safetyTimer);
        hideLoading();
        done();
        finalizeImport(imported, `sheet "${sheetName}"`);
      } catch (err) {
        console.error(err);
        clearTimeout(safetyTimer);
        hideLoading();
        done();
        toast('Gagal membaca file: ' + (err.message || 'format tidak dikenali'), 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  }, 60);
}

// Import via pasted text (copy range in Excel -> Ctrl+C -> paste here).
// Uses no File APIs at all, so it works even where file pickers/drag-drop are restricted.
function processPastedData(text) {
  if (!text || !text.trim()) { toast('Belum ada data yang ditempel', 'error'); return; }

  showLoading('Memproses data yang ditempel...');
  const safetyTimer = setTimeout(() => {
    hideLoading();
    toast('Proses memakan waktu terlalu lama dan dihentikan.', 'error');
  }, 15000);

  setTimeout(() => {
    try {
      const rawLines = text.replace(/\r/g, '').split('\n');
      const aoa = [];
      rawLines.forEach(line => {
        if (!line && aoa.length === 0) return; // skip leading blank lines
        const cells = line.split('\t');
        const firstCell = (cells[0] || '').trim();
        // A row is treated as a genuine new row only if its first cell looks like a row number.
        // Anything else (while we already have a row started) is a continuation of a multi-line
        // cell — e.g. a numbered list inside "Tujuan/Output" — whose internal line break survived
        // the copy from Excel. The remaining tab-separated cells on that continuation line are the
        // TRUE subsequent columns of the row (materi, PIC, dst), so they must be re-appended as
        // separate cells, not swallowed as raw text.
        const looksLikeNewRow = /^\d+$/.test(firstCell) || aoa.length === 0;
        if (looksLikeNewRow) {
          aoa.push(cells);
        } else {
          const prevRow = aoa[aoa.length - 1];
          const lastIdx = prevRow.length - 1;
          prevRow[lastIdx] = (prevRow[lastIdx] || '') + '\n' + (cells[0] || '');
          for (let i = 1; i < cells.length; i++) prevRow.push(cells[i]);
        }
      });
      const imported = importRowsFromAOA(aoa);
      clearTimeout(safetyTimer);
      hideLoading();
      finalizeImport(imported, 'data yang ditempel');
    } catch (err) {
      console.error(err);
      clearTimeout(safetyTimer);
      hideLoading();
      toast('Gagal memproses data: ' + (err.message || 'format tidak dikenali'), 'error');
    }
  }, 60);
}

/* ============================================================
   EXCEL EXPORT
============================================================ */
function exportToExcel() {
  const data = getFiltered().map(a => ({
    'No': a.no,
    'Tanggal Mulai': a.tglMulai,
    'Tanggal Selesai': a.tglSelesai,
    'Waktu': a.waktu,
    'Nama Kegiatan': a.namaKegiatan,
    'Layanan': a.layanan,
    'Unit Pemohon': a.unitPemohon,
    'Undangan': a.undangan,
    'Surat Tugas': a.suratTugas,
    'Kategori': a.kategori,
    'Program Terkait': a.programTerkait,
    'Tujuan/Output': a.tujuanOutput,
    'Materi': a.materi,
    'Unit Asal Narsum': a.unitAsalNarsum,
    'Peserta Target': a.pesertaTarget,
    'PIC Tim CM': a.picTimCM,
    'Lokasi/Channel': a.lokasiChannel,
    'Status': a.status || a.statusNorm,
    'Catatan': a.catatan,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:12},{wch:12},{wch:14},{wch:34},{wch:9},{wch:14},{wch:22},{wch:22},{wch:18},{wch:22},{wch:36},{wch:18},{wch:18},{wch:22},{wch:18},{wch:18},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Master Agenda');
  XLSX.writeFile(wb, `Agenda_Tim_CM_Pusmantap_${dayjs().format('YYYYMMDD_HHmm')}.xlsx`);
  toast('File Excel berhasil diunduh', 'success');
}

/* ============================================================
   EVENT WIRING
============================================================ */
function wireEvents() {
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { state.filters.search = e.target.value; state.page = 1; renderActiveTab(); }, 180);
  });
  document.getElementById('filterKategori').addEventListener('change', (e) => { state.filters.kategori = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterProgram').addEventListener('change', (e) => { state.filters.program = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterStatus').addEventListener('change', (e) => { state.filters.status = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterPic').addEventListener('change', (e) => { state.filters.pic = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterUnit').addEventListener('change', (e) => { state.filters.unit = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterLayanan').addEventListener('change', (e) => { state.filters.layanan = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterDateFrom').addEventListener('change', (e) => { state.filters.dateFrom = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterDateTo').addEventListener('change', (e) => { state.filters.dateTo = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('btnResetFilter').addEventListener('click', () => {
    state.filters = { search:'', kategori:'ALL', program:'ALL', status:'ALL', pic:'ALL', unit:'ALL', layanan:'ALL', dateFrom:'', dateTo:'' };
    document.getElementById('searchInput').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    refreshAll();
  });

  document.getElementById('btnAdd').addEventListener('click', () => openForm(null));
  document.getElementById('btnImport').addEventListener('click', openImportModal);
  document.getElementById('fileInput').addEventListener('change', handleFileUpload);
  document.getElementById('btnExport').addEventListener('click', exportToExcel);
}

/* ============================================================
   INIT
============================================================ */
(async function init() {
  wireEvents();
  await loadInitial();
  populateFilterDropdowns();
  refreshAll();
})();

</script>
